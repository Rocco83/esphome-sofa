esphome:
  # Hostname for the device; mac_suffix differentiates multiple units
  name: espsofa
  friendly_name: Sofa
  name_add_mac_suffix: true
  on_boot:
    priority: -100  # Run after all sensors are initialized
    then:
      - globals.set:
          id: buttons_locked
          value: !lambda 'return id(button_lock).state;'

esp32:
  board: esp32-c6-devkitm-1
  framework:
    type: esp-idf

# Enable logging via UART
logger:

# default HA integration, OTA updater and backup http web portal
api:
  # TODO increase the security
  # password: !secret device_password
  #encryption:
  #  key: "YOUR_ENCRYPTION_KEY"
  # 5m default delay. if no home assistant, then force reboot
  reboot_timeout: 0s

# OTA update support
ota:
  - platform: esphome
  # TODO increase the security
  # password: !secret device_password
  # change to https://esphome.io/components/ota/http_request ?

wifi:
  networks:
    - ssid: !secret wifi_1_ssid
      password: !secret wifi_1_password
    - ssid: !secret wifi_2_ssid
      password: !secret wifi_2_password
  post_connect_roaming: true

# Local diagnostic web portal
web_server:
  port: 80
  version: 2

# ---------------------------------------------------------------------------
# GLOBALS
# ---------------------------------------------------------------------------
substitutions:
  cover_max_travel_time: "12s"

globals:
  # Tracks whether physical buttons are locked out (mirrors binary_sensor state)
  - id: buttons_locked
    type: bool
    initial_value: 'false'

# ---------------------------------------------------------------------------
# BINARY SENSORS  –  physical inputs
# ---------------------------------------------------------------------------
binary_sensor:

  # --- Lockout input (IO20) ---
  # When HIGH, all physical button commands are ignored.
  # Normally pulled LOW.
  - platform: gpio
    pin:
      number: GPIO20
      mode:
        input: true
        pulldown: true
    name: "Sofa Button Lock"
    id: button_lock
    icon: "mdi:lock"
    device_class: lock
    on_state:
      then:
        - globals.set:
            id: buttons_locked
            value: !lambda 'return x;'

  # === LEFT COVER physical buttons (IO14 / IO15) ===

  - platform: gpio
    pin:
      number: GPIO14
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Left Cover Open Button"
    id: btn_left_open
    icon: "mdi:arrow-up-box"
    # Expose button state to HA but gate motor action on lock
    on_press:
      then:
        - if:
            condition:
              lambda: 'return !id(buttons_locked);'
            then:
              - cover.open: cover_left
            else:
              - logger.log:
                  level: INFO
                  format: "open left button pressed but buttons are locked"
    on_release:
      then:
        - if:
            condition:
              lambda: 'return !id(buttons_locked);'
            then:
              cover.stop: cover_left

  - platform: gpio
    pin:
      number: GPIO15
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Left Cover Close Button"
    id: btn_left_close
    icon: "mdi:arrow-down-box"
    on_press:
      then:
        - if:
            condition:
              lambda: 'return !id(buttons_locked);'
            then:
              - cover.close: cover_left
            else:
              - logger.log:
                  level: INFO
                  format: "close left button pressed but buttons are locked"
    on_release:
      then:
        - if:
            condition:
              lambda: 'return !id(buttons_locked);'
            then:
              cover.stop: cover_left

  # === RIGHT COVER physical buttons (IO18 / IO19) ===

  - platform: gpio
    pin:
      number: GPIO18
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Right Cover Open Button"
    id: btn_right_open
    icon: "mdi:arrow-up-box"
    on_press:
      then:
        - if:
            condition:
              lambda: 'return !id(buttons_locked);'
            then:
              - cover.open: cover_right
            else:
              - logger.log:
                  level: INFO
                  format: "open right button pressed but buttons are locked"
    on_release:
      then:
        - if:
            condition:
              lambda: 'return !id(buttons_locked);'
            then:
              cover.stop: cover_right

  - platform: gpio
    pin:
      number: GPIO19
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Right Cover Close Button"
    id: btn_right_close
    icon: "mdi:arrow-down-box"
    on_press:
      then:
        - if:
            condition:
              lambda: 'return !id(buttons_locked);'
            then:
              - cover.close: cover_right
            else:
              - logger.log:
                  level: INFO
                  format: "close right button pressed but buttons are locked"
    on_release:
      then:
        - if:
            condition:
              lambda: 'return !id(buttons_locked);'
            then:
              cover.stop: cover_right

# ---------------------------------------------------------------------------
# OUTPUTS  –  motor driver pins
# ---------------------------------------------------------------------------
# IO0 = Left motor OPEN  (extend)
# IO1 = Left motor CLOSE (retract)
# IO2 = Right motor OPEN  (extend)
# IO3 = Right motor CLOSE (retract)
output:
  - platform: gpio
    id: out_left_open
    pin: GPIO0
    inverted: true

  - platform: gpio
    id: out_left_close
    pin: GPIO1
    inverted: true

  - platform: gpio
    id: out_right_open
    pin: GPIO2
    inverted: true

  - platform: gpio
    id: out_right_close
    pin: GPIO3
    inverted: true

# ---------------------------------------------------------------------------
# COVERS  –  stateless, independent
# ---------------------------------------------------------------------------
# Both covers use the time-based platform without position sensing.
# open_duration / close_duration are placeholders – tune to actual motor speed.
# assumed_state: true makes HA show open/close buttons even without feedback.
cover:

  # --- Left sofa cover ---
  - platform: template
    name: "Left Sofa Cover"
    id: cover_left
    icon: "mdi:sofa"
    # No position tracking – stateless operation
    assumed_state: true
    # No position feedback – always report open to keep HA controls available
    lambda: "return COVER_OPEN;"
    # Adjust durations to match the actual motor travel time
    open_action:
      - output.turn_on: out_left_open
      - output.turn_off: out_left_close
      - script.execute: left_cover_timeout
    close_action:
      - output.turn_off: out_left_open
      - output.turn_on: out_left_close
      - script.execute: left_cover_timeout
    stop_action:
      - output.turn_off: out_left_open
      - output.turn_off: out_left_close

  # --- Right sofa cover ---
  - platform: template
    name: "Right Sofa Cover"
    id: cover_right
    icon: "mdi:sofa"
    assumed_state: true
    # No position feedback – always report open to keep HA controls available
    lambda: "return COVER_OPEN;"
    open_action:
      - output.turn_on: out_right_open
      - output.turn_off: out_right_close
      - script.execute: right_cover_timeout
    close_action:
      - output.turn_off: out_right_open
      - output.turn_on: out_right_close
      - script.execute: right_cover_timeout
    stop_action:
      - output.turn_off: out_right_open
      - output.turn_off: out_right_close

script:
  - id: left_cover_timeout
    mode: restart
    then:
      - delay: $cover_max_travel_time
      - cover.stop: cover_left

  - id: right_cover_timeout
    mode: restart
    then:
      - delay: $cover_max_travel_time
      - cover.stop: cover_right

# ---------------------------------------------------------------------------
# UTILITY
# ---------------------------------------------------------------------------
button:
  - platform: restart
    name: "ESPHome Restart"
    entity_category: "config"

text_sensor:
  - platform: version
    name: "Sofa ESPHome Version"
    icon: mdi:information
    hide_timestamp: true

  - platform: wifi_info
    ip_address:
      name: "Sofa IP Address"
    mac_address:
      name: "Sofa MAC Address"

sensor:
  - platform: wifi_signal
    name: "WiFi Signal (RSSI)"
    update_interval: 60s
    entity_category: "diagnostic"

time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/Rome"

